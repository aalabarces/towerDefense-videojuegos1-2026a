<html>

<head>
    <title>The King's Defence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <script src="utils.js"></script>

    <script src="fsm/fsm.js"></script>
    <script src="fsm/fsm_state.js"></script>
    <script src="fsm/enemigoAPuntoDeExplotarBehaviorState.js"></script>

    <script src="fsm/enemigoNormalBehaviorState.js"></script>
    <script src="fsm/enemigoMoribundoBehaviorState.js"></script>

    <script src="fsm/enemigoIdleAnimationState.js"></script>
    <script src="fsm/enemigoCaminandoAnimationState.js"></script>
    <script src="fsm/enemigoCorriendoAnimationState.js"></script>
    <script src="fsm/enemigoAPuntoDeExplotarAnimationState.js"></script>

    <script src="pixi.js"></script>
    <script src="pixi-sound.js"></script>
    <script src="clases/audioManager.js"></script>
    <script src="clases/usuario.js"></script>
    <script src="funcionQueGeneraNombres.js"></script>

    <script src="clases/gameObject.js"></script>
    <script src="clases/entidadConSalud.js"></script>
    <script src="clases/estructura.js"></script>
    <script src="clases/torre.js"></script>
    <script src="clases/torre1.js"></script>
    <script src="clases/torre2.js"></script>
    <script src="clases/torre3.js"></script>
    <script src="clases/piedra.js"></script>
    <script src="clases/centroUrbano.js"></script>
    <!-- <script src="clases/persona.js"></script> -->
    <script src="clases/enemigo.js"></script>
    <script src="clases/enemigoNormal.js"></script>
    <script src="clases/enemigoRapido.js"></script>
    <script src="clases/enemigoFuerte.js"></script>
    <script src="clases/enemigoDuro.js"></script>
    <script src="clases/bala.js"></script>
    <script src="clases/arbol.js"></script>
    <!-- <script src="clases/ui.js"></script> -->
    <script src="clases/catalogoCompras.js"></script>
    <script src="clases/uihtml.js"></script>
    <script src="clases/nivel.js"></script>
    <script src="clases/oleada.js"></script>
    <script src="clases/input.js"></script>
    <script src="clases/celda.js"></script>
    <script src="clases/grilla.js"></script>

    <script src="clases/juego.js"></script>
    <script src="clases/menuManager.js"></script>

</head>



<body>

    <!-- ─── Pantalla de carga ──────────────────────────────────────────── -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <p class="loading-text">Loading&hellip;</p>
    </div>

    <!-- ─── Pantalla de interacción inicial ────────────────────────────── -->
    <div id="start-interaction-screen" style="display:none">
        <div class="main-msg">Click to start...</div>
        <div class="sub-msg">(and give the browser permission to play music, so be careful with the volumes)</div>
    </div>

    <!-- ─── Overlay de fade (negro) ───────────────────────────────────── -->
    <div id="fade-overlay"></div>

    <!-- ─── Menú principal ────────────────────────────────────────────── -->
    <div id="main-menu" style="display:none">
        <img id="menu-bg" src="./assets/menu/bg.jpg" alt="">
        <div id="menu-overlay"></div>
        <div id="menu-content">
            <img id="menu-title" src="./assets/menu/logo.jpg" alt="Tower Defense">
            <div id="menu-buttons">
                <button id="btn-jugar" class="menu-btn menu-btn--primary">Play</button>
                <button id="btn-opciones" class="menu-btn menu-btn--secondary">Options</button>
            </div>
        </div>
    </div>

    <!-- ─── Panel de opciones ─────────────────────────────────────────── -->
    <div id="options-panel" style="display:none">
        <div class="options-inner">
            <h2 class="options-title" id="options-title">Options</h2>

            <div class="options-section">
                <h3 class="options-subtitle">Volume</h3>
                <div class="vol-group">
                    <label class="vol-label">
                        <span>General</span>
                        <input type="range" id="vol-general" min="0" max="1" step="0.01" value="1">
                    </label>
                    <label class="vol-label">
                        <span>Music</span>
                        <input type="range" id="vol-musica" min="0" max="1" step="0.01" value="1">
                    </label>
                    <label class="vol-label">
                        <span>Effects (FX)</span>
                        <input type="range" id="vol-fx" min="0" max="1" step="0.01" value="0.8">
                    </label>
                </div>
            </div>

            <div class="options-section">
                <h3 class="options-subtitle">Controls</h3>
                <div class="controls-grid">
                    <div class="controls-key">
                        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
                        <span class="controls-sep">/</span>
                        <kbd>&uarr;</kbd><kbd>&larr;</kbd><kbd>&darr;</kbd><kbd>&rarr;</kbd>
                    </div>
                    <div class="controls-desc">Move camera</div>

                    <div class="controls-key"><kbd>Mouse wheel</kbd></div>
                    <div class="controls-desc">Zoom</div>

                    <div class="controls-key"><kbd>Left click</kbd></div>
                    <div class="controls-desc">Buy / Place</div>

                    <div class="controls-key"><kbd>Right click</kbd></div>
                    <div class="controls-desc">Deselect</div>
                </div>
            </div>

            <button id="btn-volver" class="menu-btn menu-btn--secondary">Volver</button>
            <button id="btn-reanudar" class="menu-btn menu-btn--primary" style="display:none">Resume</button>
        </div>
    </div>

    <script>
        async function arrancar() {
            const juego = new Juego()
            window.juego = juego
            await juego.init()

            const menu = new MenuManager(juego)
            window.menu = menu
            menu.mostrarMenuPrincipal()
        }

        arrancar().catch((error) => {
            console.error("No se pudo arrancar el juego", error)
        })
    </script>

</body>

</html>
