        .botoncito {
            width: 60px;
            height: 60px;
            margin: 5px;

            background-size: auto 80%;
            background-color: transparent;
            border: 1px solid black;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 10px;
            cursor: pointer;
        }

        .botoncito.activo {
            opacity: 1;
            pointer-events: all;
            touch-action: all
        }

        .botoncito:not(.activo) {

            opacity: 0.3;
            pointer-events: none;
            touch-action: none;
        }

        .botoncito:hover {
            background-color: gray;
        }
