<html>

<head>

    <style>
        body {
            margin: 0px
        }

        .botoncito {
            width: 60px;
            height: 60px;
            margin: 5px;

            background-size: auto 80%;
            background-color: transparent;
            border: 1px solid black;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 10px;
            cursor: pointer;
        }

        .botoncito:hover {
            background-color: gray;
        }

        .botoncito:nth-child(1) {
            background-image: url(torre1.png);
        }

        .botoncito:nth-child(2) {
            background-image: url(torre2.png);
        }

        .botoncito:nth-child(3) {
            background-image: url(torre3.png);
        }

        .botoncito:nth-child(4) {
            background-image: url(torre4.png);
        }

        .botoncito:nth-child(5) {
            background-image: url(torre5.png);
        }


        .botoncito:nth-child(6) {
            background-image: url(rock1.png);
        }



        #ui {
            width: calc(10 * 70px);
            height: 80px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>




    <script src="utils.js"></script>
    <script src="pixi.js"></script>
    <script src="funcionQueGeneraNombres.js"></script>

    <script src="clases/gameObject.js"></script>
    <script src="clases/casita.js"></script>
    <script src="clases/torre.js"></script>
    <script src="clases/piedra.js"></script>
    <script src="clases/centroUrbano.js"></script>
    <script src="clases/persona.js"></script>
    <script src="clases/enemigo.js"></script>
    <!-- <script src="clases/ui.js"></script> -->
    <script src="clases/uihtml.js"></script>

    <script src="clases/juego.js"></script>





</head>



<body>




    <script>
        async function arrancar() {
            const juego = new Juego()

            window.juego = juego

            await juego.init()

            const cx = MUNDO_ANCHO / 2
            const cy = MUNDO_ALTO / 2



            // await juego.spawnTorre(cx - 220, cy + 80, 1)
            // await juego.spawnTorre(cx + 220, cy + 80, 2)
            for (let i = 0; i < 100; i++) {
                juego.spawnEnemigo(Math.random() * MUNDO_ANCHO, Math.random() * MUNDO_ALTO)
            }

        }

        arrancar().catch((error) => {
            console.error("No se pudo arrancar el juego", error)
        })
    </script>

</body>

</html>
